version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    container_name: sofra_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       sofra_db
      POSTGRES_USER:     sofra
      POSTGRES_PASSWORD: sofra123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sofra -d sofra_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sofra_net

  redis:
    image: redis:7-alpine
    container_name: sofra_redis
    restart: unless-stopped
    command: redis-server --requirepass redis123
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sofra_net

  rabbitmq:
    image: rabbitmq:3.13-alpine
    container_name: sofra_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: sofra
      RABBITMQ_DEFAULT_PASS: sofra123
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - sofra_net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sofra_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - sofra_net

volumes:
  postgres_data:

networks:
  sofra_net:
    driver: bridge
